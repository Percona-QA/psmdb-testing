- set_fact:
    # User to log into each AWS Instance
    ssh_user: "{{ lookup('env', 'SSH_USER') | default('none', true) }}"

- name: Remove podman-docker if present
  yum:
    name: podman-docker
    state: absent
  when: ansible_os_family == "RedHat"

- name: Add Docker CE repository
  get_url:
    url: https://download.docker.com/linux/centos/docker-ce.repo
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: '0644'
  register: download
  until: download is succeeded
  retries: 5
  delay: 3
  when:
    - ansible_os_family == "RedHat"

- name: Force release server to use 9 in Docker repo for AL2023/RHEL10 compatibility
  replace:
    path: /etc/yum.repos.d/docker-ce.repo
    regexp: '\$releasever'
    replace: '9'
  when: >
    ansible_distribution == "Amazon" or
    (ansible_distribution == "RedHat" and ansible_distribution_major_version == "10")

- name: Install dependencies
  yum:
    name: "{{ packages }}"
    state: present
    update_cache: yes
  vars:
    packages:
      - wget
      - docker-ce
      - docker-ce-cli
      - containerd.io
  when: ansible_os_family == "RedHat"

- name: Create /etc/docker directory on RHEL 10
  file:
    path: /etc/docker
    state: directory
    mode: '0755'
  when:
    - ansible_distribution == "RedHat"
    - ansible_distribution_major_version == "10"

- name: Configure Docker to not manage iptables on RHEL 10
  copy:
    dest: /etc/docker/daemon.json
    mode: '0644'
    content: |
      {
        "iptables": false
      }
  when:
    - ansible_distribution == "RedHat"
    - ansible_distribution_major_version == "10"

- name: Enable and start Docker service
  service:
    name: docker
    state: started
    enabled: true

- name: Enable IP forwarding on RHEL 10
  sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
  when:
    - ansible_distribution == "RedHat"
    - ansible_distribution_major_version == "10"

- name: Add nftables masquerade rule for Docker containers on RHEL 10
  shell: |
    nft add table ip nat 2>/dev/null || true
    nft list chain ip nat POSTROUTING 2>/dev/null || \
      nft add chain ip nat POSTROUTING '{ type nat hook postrouting priority 100; }'
    nft list ruleset | grep -q 'masquerade' || \
      nft add rule ip nat POSTROUTING ip saddr 172.16.0.0/12 masquerade
  changed_when: false
  when:
    - ansible_distribution == "RedHat"
    - ansible_distribution_major_version == "10"

- name: Ensure docker group exists
  group:
    name: docker
    state: present

- name: Add user ssh-user to docker group
  user:
    name: "{{ ssh_user }}"
    groups: docker
    append: yes
