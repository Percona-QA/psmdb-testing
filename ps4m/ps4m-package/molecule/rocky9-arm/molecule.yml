---
dependency:
  name: galaxy
driver:
  name: ec2
platforms:
  - name: rocky9-arm-${BUILD_NUMBER}-${JOB_NAME}
    region: us-west-2
    image: "${MOLECULE_ROCKY9_ARM_AMI:-ami-0e1cdd57350503889}"
    vpc_subnet_id: subnet-07f71e1a3117a32f9
    instance_type: c6g.large
    ssh_user: rocky
    root_device_name: /dev/sda1
    instance_tags:
      iit-billing-tag: jenkins-psmdb-worker
      job-name: ${JOB_NAME}
provisioner:
  name: ansible
  log: True
  playbooks:
    create: ../../../../playbooks/create.yml
    destroy: ../../../../playbooks/destroy.yml
    prepare: ../../../../playbooks/prepare-rocky9-arm.yml
    cleanup: ../../playbooks/cleanup.yml
    converge: ../../playbooks/playbook.yml
  env:
    ANSIBLE_SSH_TRANSFER_METHOD: piped
verifier:
  name: testinfra
  directory: ../../tests/
  options:
    verbose: true
    s: true
    junitxml: rocky9-arm-report.xml
scenario:
  converge_sequence:
    - prepare
    - converge
  name: rocky9-arm
  destroy_sequence:
    - destroy
  cleanup_sequence:
    - cleanup
  test_sequence:
    - destroy
    - create
    - prepare
    - converge
    - verify
    - cleanup
    - destroy
