---
- name: Prepare node for running tests
  hosts: all
  become: true
  become_method: sudo
  gather_facts: true
  tasks:

  - name: Execute storage expansion tasks for RHEL8
    block:
      - name: Dynamically find physical volume backing rootvg
        command: pvs --noheadings -o pv_name -S vg_name=rootvg
        register: pv_check
        changed_when: false

      - name: Set dynamic disk and partition variables
        set_fact:
          root_pv: "{{ pv_check.stdout | trim }}"
          root_disk: "{{ (pv_check.stdout | trim) | regex_replace('p?[0-9]+$', '') }}"
          root_part_num: "{{ (pv_check.stdout | trim) | regex_search('[0-9]+$') }}"

      - name: Print the dynamically discovered disk variables
        debug:
          msg:
            - "Discovered Physical Volume: {{ root_pv }}"
            - "Target Base Disk: {{ root_disk }}"
            - "Target Partition Number: {{ root_part_num }}"

      - name: Grow underlying physical partition dynamically
        command: "growpart {{ root_disk }} {{ root_part_num }}"
        register: growpart_out
        failed_when:
          - growpart_out.rc != 0
          - "'NOCHANGE' not in growpart_out.stdout"
        changed_when: "'CHANGED' in growpart_out.stdout"

      - name: Resize PV and extend LVs when partition was grown
        block:
          - name: Resize the physical volume to recognize new space
            command: "pvresize {{ root_pv }}"

          - name: Extend tmplv to exactly 10GB and resize filesystem
            lvol:
              vg: rootvg
              lv: tmplv
              size: 10G
              resizefs: true

          - name: Extend varlv to exactly 10GB and resize filesystem
            lvol:
              vg: rootvg
              lv: varlv
              size: 10G
              resizefs: true

          - name: Extend logical volume to 100% of free space and resize filesystem
            lvol:
              vg: rootvg
              lv: rootlv
              size: +100%FREE
              resizefs: true
        when: growpart_out.changed
    when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version == "8"
    - ansible_facts.lvm.vgs.rootvg is defined

  - name: Check disk space on root partition
    command: df -h
    register: df_output
    changed_when: false

  - name: Show disk space on root partition
    debug:
      var: df_output.stdout_lines

  - name: Remove bullseye-backports entries from apt sources
    replace:
      path: /etc/apt/sources.list
      regexp: '^(deb.*bullseye-backports)'
      replace: '# \1'
    when: ansible_distribution_release == 'bullseye'

  - name: install necessary rpm packages for RHEL8+
    yum:
      name: "{{ packages }}"
      state: present
    vars:
      packages:
      - iproute
      - bzip2-devel
      - bzip2-libs
      - gcc
      - gcc-c++
      - git
      - make
      - openssl-devel
      - sqlite-devel
      - zlib-devel
      - curl
      - python3-pip
      - python3-devel
      - psmisc
      - libffi-devel
      - xz-devel
      - unzip
    when: ansible_os_family == "RedHat" and ansible_distribution_major_version >= "8"

  - name: install necessary rpm packages for AL
    yum:
      name: "{{ packages }}"
      state: latest
    vars:
      packages:
      - iproute
      - tar
      - bzip2-devel
      - bzip2-libs
      - gcc
      - gcc-c++
      - git
      - make
      - openssl
      - openssl-devel
      - sqlite-devel
      - zlib-devel
      - python3-pip
      - python3-devel
      - psmisc
      - libffi-devel
      - xz-devel
      - unzip
    when: ansible_distribution == "Amazon"

  - name: Update apt cache
    shell: apt update --allow-releaseinfo-change
    when: ansible_os_family == "Debian"

  - name: Install necessary deb packages
    apt:
      name: "{{ packages }}"
      update_cache: yes
    vars:
      packages:
      - dirmngr
      - net-tools
      - curl
      - gcc
      - git
      - libbz2-dev
      - libreadline-dev
      - libssl-dev
      - libsqlite3-dev
      - libffi-dev
      - make
      - zlib1g-dev
      - python3
      - python3-pip
      - python3-dev
      - unzip
    when: ansible_os_family == "Debian"

  - set_fact:
      python_version: "{{ lookup('env', 'PYTHON_VERSION') | default('3.13.11', true) }}"

  - name: Download python
    get_url:
      url: https://www.python.org/ftp/python/{{ python_version }}/Python-{{ python_version }}.tgz
      dest: /opt/python.tar.gz

  - name: Extract python sources
    unarchive:
      src: /opt/python.tar.gz
      dest: /opt
      remote_src: yes

  - name: Configure python
    shell: "./configure --prefix=/opt/python"
    args:
      chdir: /opt/Python-{{ python_version }}

  - name: Build python
    shell: "make -j{{ ansible_facts.processor_vcpus | default(2) }}"
    args:
      chdir: /opt/Python-{{ python_version }}

  - name: Install python
    shell: "make install"
    args:
      chdir: /opt/Python-{{ python_version }}

  - name: Install virtualenv
    pip:
      name:
        - virtualenv
      state: latest
      executable: /opt/python/bin/pip3

  - name: Upgrade pip and create venv
    pip:
      name:
        - pip
      state: latest
      virtualenv: /opt/venv
      virtualenv_command: /opt/python/bin/virtualenv
      virtualenv_python: /opt/python/bin/python3

  - set_fact:
      ssh_pubkey: "{{ lookup('env', 'SSH_PUBKEY') | default('none', true) }}"

  - set_fact:
      ssh_user: "{{ lookup('env', 'SSH_USER') | default('none', true) }}"

  - name: Add user to Redhat
    user:
      name: "{{ ssh_user }}"
      shell: /bin/bash
      groups: wheel
      append: yes
    when: ssh_user != "none" and ssh_pubkey != "none" and ansible_facts['os_family'] == 'RedHat'

  - name: Add user to Debian
    user:
      name: "{{ ssh_user }}"
      shell: /bin/bash
      groups: sudo
      append: yes
    when: ssh_user != "none" and ssh_pubkey != "none" and ansible_facts['os_family'] == 'Debian'

  - name: Add pub key
    authorized_key:
      user: "{{ ssh_user }}"
      state: present
      key: "{{ ssh_pubkey }}"
    when: ssh_user != "none" and ssh_pubkey != "none"

  - name: Allow sudo without password
    lineinfile:
      dest: /etc/sudoers
      state: present
      regexp: '^%wheel'
      line: '%wheel ALL=(ALL) NOPASSWD: ALL'
    when: ssh_user != "none" and ssh_pubkey != "none" and ansible_facts['os_family'] == 'RedHat'

  - name: Allow sudo without password
    lineinfile:
      dest: /etc/sudoers
      state: present
      regexp: '^%sudo'
      line: '%sudo ALL=(ALL) NOPASSWD: ALL'
    when: ssh_user != "none" and ssh_pubkey != "none" and ansible_facts['os_family'] == 'Debian'
