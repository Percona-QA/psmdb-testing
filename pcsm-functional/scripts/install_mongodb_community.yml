---
- name: Add MongoDB GPG key (RedHat)
  rpm_key:
    state: present
    key: https://www.mongodb.org/static/pgp/server-{{ mongodb_version }}.0.asc
  when: ansible_os_family == "RedHat"

- name: Create MongoDB yum repository file
  copy:
    dest: /etc/yum.repos.d/mongodb-org-{{ mongodb_version }}.0.repo
    content: |
      [mongodb-org-{{ mongodb_version }}.0]
      name=MongoDB Repository
      baseurl=https://repo.mongodb.org/yum/redhat/$releasever/mongodb-org/{{ mongodb_version }}.0/x86_64/
      gpgcheck=1
      enabled=1
      gpgkey=https://www.mongodb.org/static/pgp/server-{{ mongodb_version }}.0.asc
  when: ansible_os_family == "RedHat"

- name: Install mongodb-org packages (RedHat)
  yum:
    name:
      - mongodb-org
      - mongodb-mongosh
    update_cache: yes
    state: latest
  when: ansible_os_family == "RedHat"

- name: Install gnupg and curl (Debian)
  apt:
    name:
      - gnupg
      - curl
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"

- name: Import MongoDB GPG key (Debian)
  shell: >
    curl -fsSL https://www.mongodb.org/static/pgp/server-{{ mongodb_version }}.0.asc |
    gpg -o /usr/share/keyrings/mongodb-server-{{ mongodb_version }}.0.gpg --dearmor
  args:
    creates: /usr/share/keyrings/mongodb-server-{{ mongodb_version }}.0.gpg
  when: ansible_os_family == "Debian"

- name: Add MongoDB apt repository (Debian)
  shell: >
    echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-{{ mongodb_version }}.0.gpg ]
    https://repo.mongodb.org/apt/debian $(lsb_release -cs)/mongodb-org/{{ mongodb_version }}.0 main"
    | tee /etc/apt/sources.list.d/mongodb-org-{{ mongodb_version }}.0.list
  when: ansible_os_family == "Debian" and ansible_distribution == "Debian"

- name: Add MongoDB apt repository (Ubuntu)
  shell: >
    echo "deb [ arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-{{ mongodb_version }}.0.gpg ]
    https://repo.mongodb.org/apt/ubuntu $(lsb_release -cs)/mongodb-org/{{ mongodb_version }}.0 multiverse"
    | tee /etc/apt/sources.list.d/mongodb-org-{{ mongodb_version }}.0.list
  when: ansible_os_family == "Debian" and ansible_distribution == "Ubuntu"

- name: Install mongodb-org packages (Debian)
  apt:
    name:
      - mongodb-org
      - mongodb-mongosh
    update_cache: yes
    state: latest
  when: ansible_os_family == "Debian"
