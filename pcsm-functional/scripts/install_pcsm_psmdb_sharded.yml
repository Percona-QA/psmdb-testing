- name: Change Source node hostname
  hostname:
    name: pcsm-source
  when: inventory_hostname == "sharded-pcsm-source"

- name: Change Destination node hostname
  hostname:
    name: pcsm-destination
  when: inventory_hostname == "sharded-pcsm-destination"

- name: Change Source shard 1 node hostname
  hostname:
    name: pcsm-source-shard-1
  when: inventory_hostname == "sharded-pcsm-source-shard-1"

- name: Change Source shard 2 node hostname
  hostname:
    name: pcsm-source-shard-2
  when: inventory_hostname == "sharded-pcsm-source-shard-2"

- name: Change Destination shard 1 node hostname
  hostname:
    name: pcsm-destination-shard-1
  when: inventory_hostname == "sharded-pcsm-destination-shard-1"

- name: Change Destination shard 2 node hostname
  hostname:
    name: pcsm-destination-shard-2
  when: inventory_hostname == "sharded-pcsm-destination-shard-2"

- name: Change PCSM node hostname
  hostname:
    name: pcsm-clustersync
  when: inventory_hostname == "sharded-pcsm-clustersync"

- name: Prerequisite for debian 11
  apt:
    name: iproute2
    update_cache: yes
  when: ansible_distribution == "Debian" and ansible_distribution_major_version >= "11"

- name: Install deps
  yum:
    name: "{{ packages }}"
    state: present
    update_cache: yes
  vars:
    packages:
    - jq
    - vim
    - zlib-devel
    - libjpeg-devel
    - freetype-devel
    - gcc
    - python3-devel
    - python3.12
    - python3-pip
    - make
    - wget
    - git
  when: ansible_os_family == "RedHat"

- name: Install deps
  shell: >
    apt-get update --fix-missing &&
    apt-get install -y --fix-missing
    jq vim zlib1g-dev libjpeg-dev libfreetype6-dev gcc
    python3-dev python3-pip make wget git iputils-ping
  when: ansible_os_family == "Debian"

- name: Install Go from official tarball on PCSM host
  vars:
    go_version: "{{ golang_version }}"
    go_tarball: "go{{ go_version }}.linux-amd64.tar.gz"
    go_url: "https://go.dev/dl/{{ go_tarball }}"
    go_install_dir: "/usr/local"
  block:
    - name: Download Go {{ go_version }}
      get_url:
        url: "{{ go_url }}"
        dest: "/tmp/{{ go_tarball }}"
        mode: '0644'

    - name: Extract Go
      unarchive:
        src: "/tmp/{{ go_tarball }}"
        dest: "{{ go_install_dir }}"
        remote_src: yes
  when: inventory_hostname == "sharded-pcsm-clustersync" or inventory_hostname == "sharded-pcsm-source"

- name: Check Go is available
  command: go version
  environment:
    PATH: "/usr/local/go/bin:{{ ansible_env.PATH }}"
  register: go_version_output
  ignore_errors: true
  when: inventory_hostname == "sharded-pcsm-clustersync" or inventory_hostname == "sharded-pcsm-source"

- name: Install Pymongo for Redhat
  pip:
    name:
      - pymongo
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install Pymongo on Debian
  command: python3 -m pip install --break-system-packages pymongo
  when: ansible_facts['os_family'] == 'Debian'

- name: Clone PCSM repo
  timeout: 180
  git:
    repo: 'https://github.com/percona/percona-clustersync-mongodb.git'
    dest: /tmp/percona-clustersync-mongodb
    version: "{{ pcsm_branch }}"
  when: inventory_hostname == "sharded-pcsm-clustersync"

- name: Build PCSM
  command: make build
  args:
    chdir: /tmp/percona-clustersync-mongodb
  environment:
    PATH: /usr/local/go/bin:{{ ansible_env.PATH }}
    GOROOT: /usr/local/go/
    GOBIN: /usr/local/go/bin
  when: inventory_hostname == "sharded-pcsm-clustersync"

- name: Move PCSM binary to /usr/local/bin
  copy:
    src: /tmp/percona-clustersync-mongodb/bin/pcsm
    dest: /usr/local/bin/
    mode: '0775'
    remote_src: true
  when: inventory_hostname == "sharded-pcsm-clustersync"

- name: Copy load_data.py to /tmp
  copy:
    src: ../scripts/load_data.py
    dest: /tmp/load_data.py
    mode: '0755'

- name: Get private source ip address
  set_fact:
    private_source_ip: "{{ hostvars['sharded-pcsm-source']['ansible_default_ipv4']['address'] }}"

- name: Get private destination ip address
  set_fact:
    private_destination_ip: "{{ hostvars['sharded-pcsm-destination']['ansible_default_ipv4']['address'] }}"

- name: Get private source shard ip address
  set_fact:
    private_source_shard_1_ip: "{{ hostvars['sharded-pcsm-source-shard-1']['ansible_default_ipv4']['address'] }}"

- name: Get private source shard 2 ip address
  set_fact:
    private_source_shard_2_ip: "{{ hostvars['sharded-pcsm-source-shard-2']['ansible_default_ipv4']['address'] }}"

- name: Get private destination shard 1 ip address
  set_fact:
    private_destination_shard_1_ip: "{{ hostvars['sharded-pcsm-destination-shard-1']['ansible_default_ipv4']['address'] }}"

- name: Get private destination shard 2 ip address
  set_fact:
    private_destination_shard_2_ip: "{{ hostvars['sharded-pcsm-destination-shard-2']['ansible_default_ipv4']['address'] }}"

- name: Get private pcsm ip address
  set_fact:
    private_clustersync_ip: "{{ hostvars['sharded-pcsm-clustersync']['ansible_default_ipv4']['address'] }}"

- name: Show Source IP (Debug)
  debug:
    var: private_source_ip
  when: private_source_ip is defined and inventory_hostname == "sharded-pcsm-source"

- name: Show Destination IP (Debug)
  debug:
    var: private_destination_ip
  when: private_destination_ip is defined and inventory_hostname == "sharded-pcsm-destination"

- name: Show Source shard 1 IP (Debug)
  debug:
    var: private_source_shard_1_ip
  when: private_source_shard_1_ip is defined and inventory_hostname == "sharded-pcsm-source-shard-1"

- name: Show Source shard 2 IP (Debug)
  debug:
    var: private_source_shard_2_ip
  when: private_source_shard_2_ip is defined and inventory_hostname == "sharded-pcsm-source-shard-2"

- name: Show Destination shard 1 IP (Debug)
  debug:
    var: private_destination_shard_1_ip
  when: private_destination_shard_1_ip is defined and inventory_hostname == "sharded-pcsm-destination-shard-1"

- name: Show Destination shard 2 IP (Debug)
  debug:
    var: private_destination_shard_2_ip
  when: private_destination_shard_2_ip is defined and inventory_hostname == "sharded-pcsm-destination-shard-2"

- name: Show Clustersync IP (Debug)
  debug:
    var: private_clustersync_ip
  when: private_clustersync_ip is defined and inventory_hostname == "sharded-pcsm-clustersync"

- name: Add source shard 1 to /etc/hosts of source
  blockinfile:
    path: /etc/hosts
    block: |
      {{ private_source_shard_1_ip }} shard1
      {{ private_source_shard_2_ip }} shard2
    create: false
    unsafe_writes: true
  when: inventory_hostname == "sharded-pcsm-source"

- name: Add destination shard 1 to /etc/hosts of destination
  blockinfile:
    path: /etc/hosts
    block: |
      {{ private_destination_shard_1_ip }} shard1
      {{ private_destination_shard_2_ip }} shard2
    create: false
    unsafe_writes: true
  when: inventory_hostname == "sharded-pcsm-destination"

- name: Add source and destination to /etc/hosts in pcsm
  blockinfile:
    path: /etc/hosts
    block: |
      {{ private_source_ip }}    source
      {{ private_destination_ip }}    destination
    create: false
    unsafe_writes: true
  when: inventory_hostname == "sharded-pcsm-clustersync"

- name: Install Percona MongoDB
  include_tasks: install_percona_mongodb.yml
  when: mongodb_provider == "Percona_MongoDB"

- name: Install MongoDB Community
  include_tasks: install_mongodb_community.yml
  when: mongodb_provider == "MongoDB_Community" and inventory_hostname in groups['psmdb']

- name: Copy mongosh binary to mongo path for test scripts
  file:
    src: /usr/bin/mongosh
    dest: /usr/bin/mongo
    state: link
  when: inventory_hostname in groups['psmdb']

- name: stop mongod service
  service: name=mongod state=stopped
  when: inventory_hostname in groups['psmdb']

- name: Create data directory for mongod
  file:
    path: /mnt/data/db
    state: directory
    mode: '0755'
    owner: "{{ 'mongodb' if (mongodb_provider == 'MongoDB_Community' and ansible_os_family == 'Debian') else 'mongod' }}"
    group: "{{ 'mongodb' if (mongodb_provider == 'MongoDB_Community' and ansible_os_family == 'Debian') else 'mongod' }}"
  when: inventory_hostname in groups['psmdb']

- name: Switch mongod to new dbPath
  replace:
    path: /etc/mongod.conf
    regexp: '^  dbPath: /var/lib/mongo(?:db)?'
    replace: '  dbPath: /mnt/data/db'
  when: inventory_hostname in groups['psmdb']
